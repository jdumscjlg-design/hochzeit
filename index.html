<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny & Julian heiraten!</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* Grunddesign: Rustikaler Winterwald-Hintergrund */
        body {
            font-family: 'Cormorant Garamond', serif;
            background: #111a12 url('https://images.unsplash.com/photo-1482531007909-192ac913980a?q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            color: #2c3e2b;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Die hölzerne Hauptkarte (wie das Schild auf dem Foto) */
        .main-card {
            background: #f7f4eb url('https://images.unsplash.com/photo-1541701494587-cb58502866ab?q=80&w=800') repeat;
            max-width: 650px;
            width: 100%;
            margin: 20px auto;
            padding: 40px 25px;
            border-radius: 4px;
            box-shadow: 
                0 0 0 12px #5c4033, /* Innerer Holzrahmen */
                0 15px 35px rgba(0,0,0,0.6); /* Äußerer Schatten */
            border: 3px solid #3d2b22;
            box-sizing: border-box;
            position: relative;
            text-align: center;
        }

        /* Dekorative Ecken (Tannenzweige-Andeutung) */
        .main-card::before {
            content: "❄ 🌲 ❄";
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            font-size: 1.2rem;
            color: #4a5d4e;
            letter-spacing: 10px;
            opacity: 0.7;
        }

        /* Überschriften im edlen Schreibschrift-Stil */
        h1 {
            font-family: 'Alex Brush', cursive;
            font-size: 4rem;
            color: #2b3a2d;
            margin: 20px 0 0 0;
            font-weight: normal;
            line-height: 1;
        }

        .subtitle {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-style: italic;
            color: #4a5d4e;
            margin: 0 0 30px 0;
            letter-spacing: 2px;
        }

        /* Winterlicher Countdown */
        .countdown-container {
            margin: 30px 0;
            background: rgba(255, 255, 255, 0.4);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid rgba(74, 93, 78, 0.3);
        }
        .countdown-title {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #3a4d3f;
        }
        .countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
        }
